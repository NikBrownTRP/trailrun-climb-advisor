<!-- Climb Advisor — native Suunto field layout.
     Built from standard SuuntoPlus field components (see the extension's example apps):
       * a full-width coloured BANNER for the mode (like the native cm-fg title field),
         recoloured green/orange/red at runtime via setStyle;
       * the GRADE as the big hero number (display digit font renders crisp natively),
         with a grey cm-mid-style label;
       * an HR field with the real heart glyph (SuuntoIcon2 U+F101) + bpm, the number
         switched white -> red over threshold via setStyle.
     No canvas: every element is a native field. Dynamic styling uses setText/setStyle from
     the onActivate subscribe callbacks (per the DynamicIcons example).
     Driven by main.js outputs: mode 0/1/2, gradePct, hrBpm, poles. -->
<uiView
  onLoad="
    var WORDS = ['RUN','POWER-HIKE','HIKE'];
    var ZCOL = ['#18d17a','#ff8a1f','#ff4d4d'];   /* run / power-hike / hike */
    var HR_THRESH = 165;
    var BAND_OK = '#3F7FF5', BAND_HI = '#ff4d4d';   /* HR band: blue, red over threshold */
    var subMode, subHr;
  "
  onActivate="
    subMode = $.subscribe('Zapp/{zapp_index}/Output/mode', function(v){
      v = v|0; if (v < 0 || v > 2) v = 0;
      setText('#word', WORDS[v]);
      setStyle('#banner', 'background-color', ZCOL[v]);
    });
    subHr = $.subscribe('Zapp/{zapp_index}/Output/hrBpm', function(v){
      setStyle('#hrband', 'color', (v > HR_THRESH) ? BAND_HI : BAND_OK);
    });
  "
  onDeactivate="
    $.unsubscribe(subMode);
    $.unsubscribe(subHr);
  ">
  <div id="suuntoplus">

    <!-- MODE banner: full-width zone-coloured band, colour set at runtime (setStyle). -->
    <div id="banner" style="width:100%;height:26%;background-color:#18d17a">
      <div id="word" class="f-t-l p-hc c-black" style="top:calc(64% - 50%e)">RUN</div>
    </div>

    <!-- GRADE: big number centred (50%); icon clear above it. f-d-xxl (65px) instead of
         f-d-xxxl (85px) so the tall display line-box doesn't crowd the icon on hardware. -->
    <div class="f-ico p-hc c-grey" style="font-family:'SuuntoIcon1';top:calc(31% - 50%e)">&#xF262;</div>
    <div class="f-d-xxl p-hc c-white" style="top:calc(50% - 50%e)">
      <!-- null/NaN-safe: always renders a number (never blank), even before the first value
           or when grade can't be computed (e.g. no GPS -> reads 0.0%). -->
      <eval input="Zapp/{zapp_index}/Output/gradePct" outputFormat="script x => (Number(x) === Number(x)) ? Number(x).toFixed(1) + '%' : '0.0%'" default="0.0%" />
    </div>

    <!-- motivational shout below the grade number, by mode. -->
    <div class="f-t-m p-hc c-yellow" style="top:calc(62% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0=SEND IT!|1=POWER UP!|2=DIG IN!" default="" />
    </div>

    <!-- POLES cue (only when poles = 1) — between the shout and the HR field. -->
    <div class="f-t-s p-hc c-yellow" style="top:calc(70% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/poles" outputFormat="keyValue 0= |1=POLES UP" default=" " />
    </div>

    <!-- HR field: the exact native data-field shape supplied as an alpha-PNG (hrband-q.png,
         466x466, transparent bg). Tinted via CSS — blue normally, red over threshold (setStyle
         on the img colour). Placed full-screen so its baked-in position = on-screen position. -->
    <img id="hrband" class="p-hc" src="hrband-q.png" style="top:calc(50% - 50%e);color:#3F7FF5" />
    <div class="p-hc sp-vertical-center" style="top:calc(86% - 50%e)">
      <span class="f-ico c-white" style="font-family:'SuuntoIcon2'">&#xF101;</span>
      <span class="f-d-m c-white" style="padding-left:8px">
        <eval input="Zapp/{zapp_index}/Output/hrBpm" outputFormat="script x => '' + Math.round(x)" default="--" />
      </span>
      <span class="f-t-s c-white" style="padding-left:5px">bpm</span>
    </div>

  </div>
</uiView>

<!-- Climb Advisor — live coaching screen (SuuntoPlus uiView DSL).
     Effort-zone colour: RUN=green, P-HIKE=orange, HIKE=red. The mode word is three
     overlapping colour-locked evals; only the active mode renders a word (others a space).
     Steepness shown to 0.1%, heart rate as whole bpm. -->
<uiView>
  <div id="suuntoplus">

    <!-- steepness (input) — cyan, 0.1% precision -->
    <div class="sp-d-m f-num p-hc c-cyan" style="top:calc(17% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/gradePct" outputFormat="script x => x.toFixed(1) + '%'" default="--" />
    </div>

    <!-- MODE hero — colour flips with effort zone -->
    <div class="sp-d-l p-hc c-green" style="top:calc(42% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0=RUN|1= |2= " default=" " />
    </div>
    <div class="sp-d-l p-hc c-orange" style="top:calc(42% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0= |1=P-HIKE|2= " default=" " />
    </div>
    <div class="sp-d-l p-hc c-red" style="top:calc(42% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0= |1= |2=HIKE" default=" " />
    </div>

    <!-- motivating shout-line -->
    <div class="sp-t-m p-hc c-yellow" style="top:calc(60% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0=SEND IT!|1=POWER UP!|2=DIG IN!" default="" />
    </div>

    <!-- heart rate — whole bpm -->
    <div class="sp-d-s f-num p-hc c-green" style="top:calc(77% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/hrBpm" outputFormat="script x => 'HR ' + x.toFixed(0)" default="HR --" />
    </div>

    <!-- poles cue -->
    <div class="sp-t-s p-hc c-yellow" style="top:calc(90% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/poles" outputFormat="keyValue 0= |1=POLES UP" default=" " />
    </div>

  </div>
</uiView>

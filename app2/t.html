<!-- Climb Advisor — "the living hillside" (SuuntoPlus uiView DSL).
     Canvas draws the tilting, colour-coded slope (filled wedge + ridge) from the live
     gradient + mode. The zone word + stats are reliable DSL overlays (canvas text
     positioning for the rotated word proved unreliable in this runtime — revisit later).
     Driven by main.js outputs (mode 0/1/2, gradePct, hrBpm, poles) via $.subscribe,
     redrawn with control('#cnv','REFRESH'). Canvas: no gradient/alpha/clearRect — solid
     ARGB hex (#AARRGGBB), fillRect to clear, setTransform to reset. -->
<uiView
  onLoad="
    var EXAG = 1.9, HR_THRESH = 165;
    var ZCOL = ['#18d17a','#ff8a1f','#ff4d4d'];     /* run / power-hike / hike */
    var HR_OK = '#e8edf2', HR_HI = '#ff4d4d', HEART = '#ff4d4d';
    var curMode = 0, curGrade = 0, curHr = 0;
    function argb(hex6, aa){ return '#' + aa + hex6.substring(1); }
    function slopeYAt(x, w, h, g){
      var ang = Math.atan(g/100) * EXAG, px = w*0.5, py = h*0.62;
      return py - (x - px) * Math.tan(ang);
    }
    /* heart silhouette: two lobe-circles + a downward triangle (canvas arcs+fill) */
    /* heart: two lobe circles + a diamond (rotated square) bottom — cleaner than a triangle */
    function drawHeart(ctx, cx, cy, s, color){
      var r = s*0.34;                 /* lobe radius */
      var lx = r*0.78;                /* lobe centre x-offset (overlap so the top notch is small) */
      var ly = cy - r*0.55;           /* lobe centre y */
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(cx - lx, ly, r, 0, 6.2832); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + lx, ly, r, 0, 6.2832); ctx.fill();
      /* diamond: top corner between lobes, side corners at lobe centres, bottom = tip */
      ctx.beginPath();
      ctx.moveTo(cx, ly - r*0.15);
      ctx.lineTo(cx - lx - r*0.74, ly + r*0.35);
      ctx.lineTo(cx, cy + s*0.52);
      ctx.lineTo(cx + lx + r*0.74, ly + r*0.35);
      ctx.closePath(); ctx.fill();
    }
    function drawScene(ctx){
      var w = ctx.width, h = ctx.height, col = ZCOL[curMode], g = curGrade;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
      var yL = slopeYAt(0,w,h,g), yR = slopeYAt(w,w,h,g);
      ctx.beginPath();
      ctx.moveTo(0,yL); ctx.lineTo(w,yR); ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
      ctx.fillStyle = argb(col,'22'); ctx.fill();         /* ~0.13 alpha ground */
      ctx.beginPath(); ctx.moveTo(0,yL); ctx.lineTo(w,yR);
      ctx.strokeStyle = argb(col,'E6'); ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

      /* heart-rate: heart glyph + whole-bpm number, both on canvas (sans, edge-safe),
         side-by-side and vertically centred on ny */
      var hrc = curHr > HR_THRESH ? HR_HI : HR_OK;
      var num = String(Math.round(curHr));
      var ny = h*0.86;                                    /* shared vertical centre */
      var fs = Math.round(w*0.12);                        /* number font size */
      ctx.font = fs + 'px monospace numbers';
      var nw = ctx.measureText(num).width;
      var hs = fs*0.92, gap = fs*0.26;
      var x0 = w*0.5 - (hs + gap + nw)*0.5;
      drawHeart(ctx, x0 + hs*0.5, ny, hs, HEART);   /* heart always red */
      ctx.fillStyle = hrc;                           /* number white -> red over threshold */
      /* 'monospace numbers' draws digits DOWNWARD from the y arg, so lift by ~0.5*fs to centre on ny */
      ctx.fillText(num, x0 + hs + gap, ny - fs*0.5);
    }
  "
  onActivate="
    $.subscribe('Zapp/{zapp_index}/Output/mode', function(v){ curMode = v|0; control('#cnv','REFRESH'); });
    $.subscribe('Zapp/{zapp_index}/Output/gradePct', function(v){ curGrade = v; control('#cnv','REFRESH'); });
    $.subscribe('Zapp/{zapp_index}/Output/hrBpm', function(v){ curHr = v; control('#cnv','REFRESH'); });
  ">
  <div id="suuntoplus">

    <!-- tilting colour-coded slope -->
    <object id="cnv" type="canvas" style="position:absolute;left:0;top:0;width:100%;height:100%;"
            build="ctx => drawScene(ctx)" />

    <!-- grade (cyan, 0.1%) — f-num digits are sans; inline size for a medium readout -->
    <div class="f-num p-hc c-cyan" style="top:calc(14% - 50%e);font-size:52px;line-height:52px">
      <eval input="Zapp/{zapp_index}/Output/gradePct" outputFormat="script x => x.toFixed(1) + '%'" default="--" />
    </div>

    <!-- poles cue -->
    <div class="f-t-m p-hc c-yellow" style="top:calc(27% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/poles" outputFormat="keyValue 0= |1=POLES UP" default=" " />
    </div>

    <!-- MODE word — f-t-l is SANS (display fonts render serif letters); inline font-size scales it up -->
    <div class="f-t-l p-hc c-green" style="top:calc(50% - 50%e);font-size:80px;line-height:80px">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0=RUN|1= |2= " default=" " />
    </div>
    <div class="f-t-l p-hc c-orange" style="top:calc(50% - 50%e);font-size:80px;line-height:80px">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0= |1=P-HIKE|2= " default=" " />
    </div>
    <div class="f-t-l p-hc c-red" style="top:calc(50% - 50%e);font-size:80px;line-height:80px">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0= |1= |2=HIKE" default=" " />
    </div>

    <!-- coach shout -->
    <div class="f-t-l p-hc c-yellow" style="top:calc(69% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="keyValue 0=SEND IT!|1=POWER UP!|2=DIG IN!" default="" />
    </div>

    <!-- heart rate (heart glyph + bpm) is drawn on the canvas -->


  </div>
</uiView>

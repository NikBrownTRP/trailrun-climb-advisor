<!-- SuuntoPlus Sports App view. Custom uiView DSL (NOT standard HTML): a single
     #suuntoplus container with absolutely-positioned <div>s. Layout/fonts come from
     class names (sp-d-* digits, sp-t-* text, f-num, p-hc = horizontal-centre) + style
     top:calc(Y% - 50%e). <eval> binds an output (no class on eval — wrap it in a div).
     Outputs are set in main.js and mapped to Zapp/{zapp_index}/Output/<name>. -->
<uiView>
  <div id="suuntoplus">

    <!-- primary advice: RUN / P-HIKE / HIKE -->
    <div class="sp-d-m p-hc" style="top:calc(22% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/mode" outputFormat="auto" default="--" />
    </div>

    <!-- gradient under-foot, % -->
    <div class="sp-t-s p-hc" style="top:calc(40% - 50%e)">GRADE %</div>
    <div class="sp-d-s f-num p-hc" style="top:calc(50% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/gradePct" outputFormat="auto" default="0" />
    </div>

    <!-- HR now / baked ceiling, bpm -->
    <div class="sp-t-s p-hc" style="top:calc(64% - 50%e)">HR bpm</div>
    <div class="sp-d-s f-num p-hc" style="top:calc(74% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/hrBpm" outputFormat="auto" default="--" />
    </div>

    <!-- poles flag (1 → POLES) -->
    <div class="sp-t-s p-hc" style="top:calc(90% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/poles" outputFormat="keyValue 0=-|1=POLES" default="-" />
    </div>

  </div>
</uiView>

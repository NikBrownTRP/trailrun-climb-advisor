<!-- Climb Advisor — native Suunto field layout.
     Built from standard SuuntoPlus field components (see the extension's example apps):
       * a full-width coloured BANNER for the mode (like the native cm-fg title field),
         recoloured green/orange/red at runtime via setStyle;
       * the GRADE as the big hero number (display digit font renders crisp natively),
         with a grey cm-mid-style label;
       * an HR field with the real heart glyph (SuuntoIcon2 U+F101) + bpm, the number
         switched white -> red over threshold via setStyle.
     No canvas: every element is a native field. Dynamic styling uses setText/setStyle from
     the onActivate subscribe callbacks (per the DynamicIcons example).
     Driven by main.js outputs: mode 0/1/2, gradePct, hrBpm, poles. -->
<uiView
  onLoad="
    var WORDS = ['RUN','POWER-HIKE','HIKE'];
    var ZCOL = ['#18d17a','#ff8a1f','#ff4d4d'];   /* run / power-hike / hike */
    var HR_THRESH = 165, HR_OK = '#e8edf2', HR_HI = '#ff4d4d';
    var subMode, subHr;
  "
  onActivate="
    subMode = $.subscribe('Zapp/{zapp_index}/Output/mode', function(v){
      v = v|0; if (v < 0 || v > 2) v = 0;
      setText('#word', WORDS[v]);
      setStyle('#banner', 'background-color', ZCOL[v]);
    });
    subHr = $.subscribe('Zapp/{zapp_index}/Output/hrBpm', function(v){
      setStyle('#hrnum', 'color', (v > HR_THRESH) ? HR_HI : HR_OK);
    });
  "
  onDeactivate="
    $.unsubscribe(subMode);
    $.unsubscribe(subHr);
  ">
  <div id="suuntoplus">

    <!-- MODE banner: full-width zone-coloured band, colour set at runtime (setStyle). -->
    <div id="banner" style="width:100%;height:26%;background-color:#18d17a">
      <div id="word" class="f-t-l p-hc c-black" style="top:calc(64% - 50%e)">RUN</div>
    </div>

    <!-- GRADE: native uphill-grade icon (SuuntoIcon1 U+F262) + big hero number. -->
    <div class="f-ico p-hc c-grey" style="font-family:'SuuntoIcon1';top:calc(40% - 50%e)">&#xF262;</div>
    <div class="f-num p-hc c-white" style="top:calc(56% - 50%e);font-size:92px;line-height:92px">
      <eval input="Zapp/{zapp_index}/Output/gradePct" outputFormat="script x => x.toFixed(1) + '%'" default="--" />
    </div>

    <!-- POLES cue (only when poles = 1). -->
    <div class="f-t-s p-hc c-yellow" style="top:calc(70% - 50%e)">
      <eval input="Zapp/{zapp_index}/Output/poles" outputFormat="keyValue 0= |1=POLES UP" default=" " />
    </div>

    <!-- HR field: real heart glyph + bpm, centred. Number colour set at runtime. -->
    <div class="p-hc sp-vertical-center" style="top:calc(83% - 50%e)">
      <span class="f-ico c-red" style="font-family:'SuuntoIcon2'">&#xF101;</span>
      <span id="hrnum" class="f-num c-white" style="padding-left:8px;font-size:42px">
        <eval input="Zapp/{zapp_index}/Output/hrBpm" outputFormat="script x => '' + Math.round(x)" default="--" />
      </span>
    </div>

  </div>
</uiView>
